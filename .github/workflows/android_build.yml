name: Android Build
on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'

    - name: Setup App Directory
      run: |
        flutter --disable-analytics
        rm -rf * .git*
        flutter create --org com.levo --project-name levo .

    - name: Create Main Dart Code
      run: |
        num_runs=${{ github.run_number }}
        echo "Injecting clean structural code into lib/main.dart"
        
        cat > lib/main.dart << 'MAIN_DART'
        import 'package:flutter/material.dart';
        import 'dart:async';

        void main() => runApp(const LevoApp());

        class LevoApp extends StatelessWidget {
          const LevoApp({super.key});
          @override
          Widget build(BuildContext context) {
            return MaterialApp(
              title: 'Levo',
              debugShowCheckedModeBanner: false,
              theme: ThemeData.dark().copyWith(
                scaffoldBackgroundColor: Colors.black,
              ),
              home: const LuxurySplashScreen(),
            );
          }
        }

        class LuxurySplashScreen extends StatefulWidget {
          const LuxurySplashScreen({super.key});
          @override
          State<LuxurySplashScreen> createState() => _LuxurySplashScreenState();
        }

        class _LuxurySplashScreenState extends State<LuxurySplashScreen> {
          @override
          void initState() {
            super.initState();
            Timer(const Duration(milliseconds: 1500), () {
              Navigator.of(context).pushReplacement(
                MaterialPageRoute(builder: (_) => const AuthScreen()),
              );
            });
          }
          @override
          Widget build(BuildContext context) {
            return Scaffold(
              body: Center(
                child: Container(
                  padding: const EdgeInsets.symmetric(horizontal: 24, vertical: 12),
                  decoration: BoxDecoration(
                    border: Border.all(color: const Color(0xFF00E5FF), width: 2),
                    borderRadius: BorderRadius.circular(12),
                    boxShadow: [
                      BoxShadow(color: const Color(0xFF00E5FF).withOpacity(0.4), blurRadius: 20),
                      BoxShadow(color: const Color(0xFF9C27B0).withOpacity(0.3), blurRadius: 40),
                    ],
                  ),
                  child: const Text(
                    'ELISA EDITZ',
                    style: TextStyle(fontSize: 32, fontWeight: FontWeight.bold, color: Colors.white, letterSpacing: 4),
                  ),
                ),
              ),
            );
          }
        }

        class AuthScreen extends StatefulWidget {
          const AuthScreen({super.key});
          @override
          State<AuthScreen> createState() => _AuthScreenState();
        }

        class _AuthScreenState extends State<AuthScreen> {
          @override
          Widget build(BuildContext context) {
            return Scaffold(
              body: Center(
                child: SingleChildScrollView(
                  padding: const EdgeInsets.all(24.0),
                  child: Container(
                    padding: const EdgeInsets.all(24),
                    decoration: BoxDecoration(
                      color: const Color(0xFF080808),
                      borderRadius: BorderRadius.circular(20),
                      border: Border.all(color: const Color(0xFF00E5FF).withOpacity(0.3)),
                    ),
                    child: Column(
                      mainAxisSize: MainAxisSize.min,
                      crossAxisAlignment: CrossAxisAlignment.stretch,
                      children: [
                        const Text('WELCOME BACK', style: TextStyle(fontSize: 22, fontWeight: FontWeight.bold, letterSpacing: 2), textAlign: TextAlign.center),
                        const SizedBox(height: 24),
                        const TextField(decoration: InputDecoration(labelText: 'Username', filled: true, fillColor: Color(0xFF101010))),
                        const SizedBox(height: 12),
                        const TextField(obscureText: true, decoration: InputDecoration(labelText: 'Password', filled: true, fillColor: Color(0xFF101010))),
                        const SizedBox(height: 24),
                        ElevatedButton(
                          style: ElevatedButton.styleFrom(backgroundColor: const Color(0xFF00E5FF)),
                          onPressed: () => Navigator.of(context).pushReplacement(MaterialPageRoute(builder: (_) => const MainFeed())),
                          child: const Text('CONTINUE', style: TextStyle(color: Colors.black, fontWeight: FontWeight.bold)),
                        ),
                        const SizedBox(height: 16),
                        Row(
                          children: [
                            Expanded(child: OutlinedButton(onPressed: () {}, child: const Text('Facebook'))),
                            const SizedBox(width: 12),
                            Expanded(child: OutlinedButton(onPressed: () {}, child: const Text('Gmail'))),
                          ],
                        ),
                      ],
                    ),
                  ),
                ),
              ),
            );
          }
        }

        class MainFeed extends StatefulWidget {
          const MainFeed({super.key});
          @override
          State<MainFeed> createState() => _MainFeedState();
        }

        class _MainFeedState extends State<MainFeed> {
          int _index = 0;
          @override
          Widget build(BuildContext context) {
            return Scaffold(
              body: PageView.builder(
                scrollDirection: Axis.vertical,
                itemCount: 5,
                onPageChanged: (v) => setState(() => _index = v),
                itemBuilder: (context, i) {
                  return AnimatedScale(
                    scale: _index == i ? 1.0 : 0.85,
                    duration: const Duration(milliseconds: 300),
                    child: Container(
                      margin: const EdgeInsets.all(10),
                      decoration: BoxDecoration(
                        color: const Color(0xFF0B0B0B),
                        borderRadius: BorderRadius.circular(24),
                        border: Border.all(color: const Color(0xFF00E5FF).withOpacity(0.2)),
                      ),
                      child: Center(child: Text('@elisa_editz_official_$i', style: const TextStyle(color: Color(0xFF00E5FF)))),
                    ),
                  );
                },
              ),
              bottomNavigationBar: BottomNavigationBar(
                backgroundColor: Colors.black,
                selectedItemColor: const Color(0xFF00E5FF),
                unselectedItemColor: Colors.white54,
                type: BottomNavigationBarType.fixed,
                items: const [
                  BottomNavigationBarItem(icon: Icon(Icons.home_filled), label: ''),
                  BottomNavigationBarItem(icon: Icon(Icons.search), label: ''),
                  BottomNavigationBarItem(icon: Icon(Icons.maps_ugc), label: ''),
                  BottomNavigationBarItem(icon: Icon(Icons.person_outline), label: ''),
                ],
              ),
            );
          }
        }
        MAIN_DART

    - name: Build APK File
      run: |
        flutter pub get
        flutter build apk --release

    - name: Deploy to Releases Page
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: Levo Premium App Release v${{ github.run_number }}
        files: build/app/outputs/flutter-apk/app-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}            
