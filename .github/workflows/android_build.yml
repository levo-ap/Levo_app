name: Android Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'

    - name: Initialize Clean App
      run: |
        flutter --disable-analytics
        rm -rf * .git*
        flutter create --org com.levo --project-name levo .

    # Ekdum safe design bina kisi configuration yaml modify error ke
    - name: Overwrite Code with Smooth Interactions
      run: |
        cat << 'EOF' > lib/main.dart
        import 'package:flutter/material.dart';
        import 'dart:async';

        void main() {
          runApp(const LevoApp());
        }

        class LevoApp extends StatelessWidget {
          const LevoApp({super.key});

          @override
          Widget build(BuildContext context) {
            return MaterialApp(
              title: 'Levo',
              debugShowCheckedModeBanner: false,
              theme: ThemeData.dark().copyWith(
                scaffoldBackgroundColor: const Color(0xFF0A0A0A),
                colorScheme: ColorScheme.fromSeed(seedColor: const Color(0xFFD4AF37), brightness: Brightness.dark),
              ),
              home: const LuxurySplashScreen(),
            );
          }
        }

        class LuxurySplashScreen extends StatefulWidget {
          const LuxurySplashScreen({super.key});
          @override
          State<LuxurySplashScreen> createState() => _LuxurySplashScreenState();
        }

        class _LuxurySplashScreenState extends State<LuxurySplashScreen> {
          double _opacity = 1.0;

          @override
          void initState() {
            super.initState();
            // Exactly 1-second fade out
            Timer(const Duration(milliseconds: 1000), () {
              if (mounted) setState(() => _opacity = 0.0);
            });
            Timer(const Duration(milliseconds: 1400), () {
              if (mounted) {
                Navigator.of(context).pushReplacement(
                  MaterialPageRoute(builder: (_) => const MainInteractiveFeed()),
                );
              }
            });
          }

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              body: AnimatedOpacity(
                opacity: _opacity,
                duration: const Duration(milliseconds: 400),
                child: const Center(
                  child: Text(
                    'LEVO',
                    style: TextStyle(fontSize: 48, fontWeight: FontWeight.bold, color: Color(0xFFD4AF37), letterSpacing: 6),
                  ),
                ),
              ),
            );
          }
        }

        class MainInteractiveFeed extends StatefulWidget {
          const MainInteractiveFeed({super.key});
          @override
          State<MainInteractiveFeed> createState() => _MainInteractiveFeedState();
        }

        class _MainInteractiveFeedState extends State<MainInteractiveFeed> {
          double _emojiScale = 0.0;
          bool _isLiked = false;

          void _triggerTelegramReaction() {
            setState(() {
              _isLiked = !_isLiked;
              _emojiScale = 1.5;
            });
            Future.delayed(const Duration(milliseconds: 500), () {
              if (mounted) setState(() => _emojiScale = 0.0);
            });
          }

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              body: Stack(
                children: [
                  GestureDetector(
                    onDoubleTap: _triggerTelegramReaction,
                    child: Container(
                      color: const Color(0xFF121212),
                      child: const Center(child: Icon(Icons.play_circle_outline, size: 80, color: Colors.white24)),
                    ),
                  ),
                  // Telegram Bouncy Pop Emoji
                  Center(
                    child: AnimatedScale(
                      scale: _emojiScale,
                      duration: const Duration(milliseconds: 250),
                      curve: Curves.bounceOut,
                      child: Icon(
                        _isLiked ? Icons.local_fire_department : Icons.favorite,
                        size: 150,
                        color: _isLiked ? Colors.orangeAccent : const Color(0xFFD4AF37),
                      ),
                    ),
                  ),
                  Positioned(
                    bottom: 40, left: 20, right: 20,
                    child: Row(
                      mainAxisAlignment: MainAxisAlignment.spaceBetween,
                      children: [
                        Column(
                          crossAxisAlignment: CrossAxisAlignment.start,
                          mainAxisSize: MainAxisSize.min,
                          children: const [
                            Text('@levo_premium_network', style: TextStyle(fontWeight: FontWeight.bold, color: Color(0xFFD4AF37), fontSize: 16)),
                            SizedBox(height: 4),
                            Text('Cinematic Layout Base Active', style: TextStyle(color: Colors.white70)),
                          ],
                        ),
                        Row(
                          children: [
                            IconButton(icon: Icon(_isLiked ? Icons.favorite : Icons.favorite_border, color: Colors.red), onPressed: _triggerTelegramReaction),
                            IconButton(icon: const Icon(Icons.share_outlined), onPressed: () {}),
                          ],
                        )
                      ],
                    ),
                  )
                ],
              ),
            );
          }
        }
        EOF

    - name: Build APK
      run: |
        flutter pub get
        flutter build apk --release
        
    - uses: actions/upload-artifact@v4
      with:
        name: levo-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        
