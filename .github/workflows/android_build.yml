name: Android Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'

    # Is baar hum project ka naam direct capital L se hi create kar rahe hain taaki sed ki zaroorat na pade
    - name: Create Clean Flutter Project
      run: |
        rm -rf * .git*
        flutter create --org com.levo --project-name Levo .

    # A to Z Premium Social Features Integration
    - name: Overwrite Code with Advanced MultiScreen Architecture
      run: |
        cat << 'EOF' > lib/main.dart
        import 'package:flutter/material.dart';
        import 'dart:async';

        void main() {
          runApp(const LevoApp());
        }

        class LevoApp extends StatelessWidget {
          const LevoApp({super.key});

          @override
          Widget build(BuildContext context) {
            return MaterialApp(
              title: 'Levo',
              debugShowCheckedModeBanner: false,
              theme: ThemeData.dark().copyWith(
                scaffoldBackgroundColor: const Color(0xFF0A0A0A),
                colorScheme: ColorScheme.fromSeed(seedColor: const Color(0xFFD4AF37), brightness: Brightness.dark),
              ),
              home: const LuxurySplashScreen(),
            );
          }
        }

        class LuxurySplashScreen extends StatefulWidget {
          const LuxurySplashScreen({super.key});
          @override
          State<LuxurySplashScreen> createState() => _LuxurySplashScreenState();
        }

        class _LuxurySplashScreenState extends State<LuxurySplashScreen> {
          double _opacity = 1.0;

          @override
          void initState() {
            super.initState();
            Timer(const Duration(milliseconds: 1000), () {
              if (mounted) {
                setState(() {
                  _opacity = 0.0;
                });
              }
            });
            Timer(const Duration(milliseconds: 1400), () {
              if (mounted) {
                Navigator.of(context).pushReplacement(
                  MaterialPageRoute(builder: (_) => const AuthScreen()),
                );
              }
            });
          }

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              body: AnimatedOpacity(
                opacity: _opacity,
                duration: const Duration(milliseconds: 400),
                child: Center(
                  child: Image.asset(
                    'assets/logo.png',
                    width: 150,
                    height: 150,
                    errorBuilder: (context, error, stackTrace) {
                      return const Text(
                        'LEVO',
                        style: TextStyle(fontSize: 48, fontWeight: FontWeight.bold, color: Color(0xFFD4AF37), letterSpacing: 6),
                      );
                    },
                  ),
                ),
              ),
            );
          }
        }

        class AuthScreen extends StatefulWidget {
          const AuthScreen({super.key});
          @override
          State<AuthScreen> createState() => _AuthScreenState();
        }

        class _AuthScreenState extends State<AuthScreen> {
          bool isLogin = true;
          @override
          Widget build(BuildContext context) {
            return Scaffold(
              body: Padding(
                padding: const EdgeInsets.all(24.0),
                child: Column(
                  mainAxisAlignment: MainAxisAlignment.center,
                  crossAxisAlignment: CrossAxisAlignment.stretch,
                  children: [
                    Text(isLogin ? 'Welcome Back' : 'Create Account', style: const TextStyle(fontSize: 32, fontWeight: FontWeight.bold), textAlign: TextAlign.center),
                    const SizedBox(height: 40),
                    const TextField(decoration: InputDecoration(labelText: 'Username or Email', border: OutlineInputBorder())),
                    const SizedBox(height: 16),
                    const TextField(obscureText: true, decoration: InputDecoration(labelText: 'Password', border: OutlineInputBorder())),
                    const SizedBox(height: 24),
                    ElevatedButton(
                      style: ElevatedButton.styleFrom(backgroundColor: const Color(0xFFD4AF37), padding: const EdgeInsets.symmetric(vertical: 16)),
                      onPressed: () => Navigator.of(context).pushReplacement(MaterialPageRoute(builder: (_) => const HomeScreen())),
                      child: Text(isLogin ? 'Login' : 'Sign Up', style: const TextStyle(color: Colors.black, fontSize: 16, fontWeight: FontWeight.bold)),
                    ),
                    TextButton(
                      onPressed: () => setState(() => isLogin = !isLogin),
                      child: Text(isLogin ? "Don't have an account? Sign Up" : "Already have an account? Login"),
                    )
                  ],
                ),
              ),
            );
          }
        }

        class HomeScreen extends StatefulWidget {
          const HomeScreen({super.key});
          @override
          State<HomeScreen> createState() => _HomeScreenState();
        }

        class _HomeScreenState extends State<HomeScreen> {
          int _currentIndex = 0;
          final List<Widget> _pages = [const VideoFeedPage(), const SearchPage(), const ProfilePage()];

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              body: _pages[_currentIndex],
              bottomNavigationBar: BottomNavigationBar(
                currentIndex: _currentIndex,
                selectedItemColor: const Color(0xFFD4AF37),
                unselectedItemColor: Colors.white60,
                onTap: (index) => setState(() => _currentIndex = index),
                items: const [
                  BottomNavigationBarItem(icon: Icon(Icons.movie_filter), label: 'Feed'),
                  BottomNavigationBarItem(icon: Icon(Icons.search), label: 'Search'),
                  BottomNavigationBarItem(icon: Icon(Icons.person), label: 'Profile'),
                ],
              ),
            );
          }
        }

        class VideoFeedPage extends StatefulWidget {
          const VideoFeedPage({super.key});
          @override
          State<VideoFeedPage> createState() => _VideoFeedPageState();
        }

        class _VideoFeedPageState extends State<VideoFeedPage> {
          double _emojiScale = 0.0;
          bool _isLiked = false;
          final List<Color> _refreshColors = [Colors.red, Colors.amber, Colors.blue, Colors.purple, Colors.green];
          int _colorIndex = 0;

          Future<void> _handleRefresh() async {
            setState(() {
              _colorIndex = (_colorIndex + 1) % _refreshColors.length;
            });
            await Future.delayed(const Duration(seconds: 2));
          }

          void _triggerTelegramReaction() {
            setState(() {
              _isLiked = !_isLiked;
              _emojiScale = 1.4;
            });
            Future.delayed(const Duration(milliseconds: 500), () {
              if (mounted) setState(() => _emojiScale = 0.0);
            });
          }

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              body: SafeArea(
                child: RefreshIndicator(
                  color: _refreshColors[_colorIndex],
                  onRefresh: _handleRefresh,
                  child: ListView(
                    padding: EdgeInsets.zero,
                    children: [
                      SizedBox(
                        height: 100,
                        child: ListView.builder(
                          scrollDirection: Axis.horizontal,
                          itemCount: 6,
                          itemBuilder: (context, index) => Padding(
                            padding: const EdgeInsets.all(8.0),
                            child: Column(
                              children: [
                                CircleAvatar(
                                  radius: 28,
                                  backgroundColor: _refreshColors[index % _refreshColors.length],
                                  child: const CircleAvatar(radius: 25, backgroundColor: Colors.black, child: Icon(Icons.person)),
                                ),
                                const SizedBox(height: 4),
                                Text('Story ${index + 1}', style: const TextStyle(fontSize: 10, color: Colors.white70)),
                              ],
                            ),
                          ),
                        ),
                      ),
                      Stack(
                        children: [
                          GestureDetector(
                            onDoubleTap: _triggerTelegramReaction,
                            child: Container(
                              height: MediaQuery.of(context).size.height - 240,
                              color: const Color(0xFF151515),
                              child: const Center(child: Icon(Icons.play_circle_fill, size: 80, color: Colors.white38)),
                            ),
                          ),
                          Positioned.fill(
                            child: Center(
                              child: AnimatedScale(
                                scale: _emojiScale,
                                duration: const Duration(milliseconds: 250),
                                curve: Curves.bounceOut,
                                child: Icon(
                                  _isLiked ? Icons.local_fire_department : Icons.favorite,
                                  size: 150,
                                  color: _isLiked ? Colors.orangeAccent : const Color(0xFFD4AF37),
                                ),
                              ),
                            ),
                          ),
                          Positioned(
                            bottom: 20, left: 16, right: 16,
                            child: Row(
                              mainAxisAlignment: MainAxisAlignment.spaceBetween,
                              children: [
                                Column(
                                  crossAxisAlignment: CrossAxisAlignment.start,
                                  mainAxisSize: MainAxisSize.min,
                                  children: [
                                    GestureDetector(
                                      onTap: () => ScaffoldMessenger.of(context).showSnackBar(const SnackBar(content: Text("Profile redirect setup..."))),
                                      child: const Text('@levo_global_network', style: TextStyle(fontWeight: FontWeight.bold, color: Color(0xFFD4AF37), fontSize: 15)),
                                    ),
                                    const SizedBox(height: 4),
                                    const Text('Premium luxury interface showreel.', style: TextStyle(color: Colors.white70)),
                                  ],
                                ),
                                Row(
                                  children: [
                                    IconButton(icon: Icon(_isLiked ? Icons.favorite : Icons.favorite_border, color: Colors.red), onPressed: _triggerTelegramReaction),
                                    IconButton(icon: const Icon(Icons.comment_outlined, color: Colors.white), onPressed: () => _showCommentsBottomSheet(context)),
                                    IconButton(icon: const Icon(Icons.share_outlined, color: Colors.white), onPressed: () => _showSharePanel(context)),
                                  ],
                                )
                              ],
                            ),
                          )
                        ],
                      ),
                    ],
                  ),
                ),
              ),
            );
          }

          void _showCommentsBottomSheet(BuildContext context) {
            showModalBottomSheet(
              context: context,
              isScrollControlled: true,
              builder: (context) => Padding(
                padding: EdgeInsets.only(bottom: MediaQuery.of(context).viewInsets.bottom, left: 16, right: 16, top: 16),
                child: Column(
                  mainAxisSize: MainAxisSize.min,
                  children: [
                    const Text('Comments', style: TextStyle(fontSize: 18, fontWeight: FontWeight.bold)),
                    const SizedBox(height: 10),
                    SizedBox(
                      height: 200,
                      child: ListView(
                        children: const [
                          ListTile(title: Text('@vfx_editor: Absolute fire work inside Levo! 🔥')),
                          ListTile(title: Text('@branding_king: Mentioned @levo framework inside comments section.')),
                        ],
                      ),
                    ),
                    TextField(decoration: const InputDecoration(hintText: 'Add comment, mention users using @...'), onSubmitted: (val) => Navigator.pop(context)),
                    const SizedBox(height: 16),
                  ],
                ),
              ),
            );
          }

          void _showSharePanel(BuildContext context) {
            showModalBottomSheet(
              context: context,
              builder: (context) => Container(
                padding: const EdgeInsets.all(24),
                child: Column(
                  mainAxisSize: MainAxisSize.min,
                  children: [
                    const Text('Share Video', style: TextStyle(fontSize: 16, fontWeight: FontWeight.bold)),
                    const SizedBox(height: 20),
                    Row(
                      mainAxisAlignment: MainAxisAlignment.spaceEvenly,
                      children: [
                        ElevatedButton.icon(icon: const Icon(Icons.link), label: const Text('Copy Link'), onPressed: () => Navigator.pop(context)),
                        ElevatedButton.icon(icon: const Icon(Icons.send), label: const Text('Send to Feed'), onPressed: () => Navigator.pop(context)),
                      ],
                    ),
                  ],
                ),
              ),
            );
          }
        }

        class SearchPage extends StatelessWidget {
          const SearchPage({super.key});
          @override
          Widget build(BuildContext context) {
            return Scaffold(
              appBar: AppBar(title: const TextField(decoration: InputDecoration(hintText: 'Search Username, Area, Location...', border: InputBorder.none))),
              body: ListView(
                children: const [
                  ListTile(leading: Icon(Icons.search, color: Color(0xFFD4AF37)), title: Text('Query User ID: @levo_creator_studio')),
                  ListTile(leading: Icon(Icons.location_on, color: Colors.redAccent), title: Text('Area Location: Mumbai High-End Studios')),
                  ListTile(leading: Icon(Icons.map, color: Colors.blueAccent), title: Text('Specific Sector Search: Connaught Base Area')),
                ],
              ),
            );
          }
        }

        class ProfilePage extends StatefulWidget {
          const ProfilePage({super.key});
          @override
          State<ProfilePage> createState() => _ProfilePageState();
        }

        class _ProfilePageState extends State<ProfilePage> {
          String name = "Levo Developer Pro";
          String username = "levo_network";
          String bio = "Cinematic Branding System Custom App Architecture.";

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              body: SafeArea(
                child: Padding(
                  padding: const EdgeInsets.all(24.0),
                  child: Column(
                    crossAxisAlignment: CrossAxisAlignment.start,
                    children: [
                      Row(
                        children: [
                          const CircleAvatar(radius: 40, backgroundColor: Color(0xFFD4AF37), child: Icon(Icons.person, size: 40, color: Colors.black)),
                          const SizedBox(width: 20),
                          Column(
                            crossAxisAlignment: CrossAxisAlignment.start,
                            children: [
                              Text(name, style: const TextStyle(fontSize: 20, fontWeight: FontWeight.bold)),
                              Text('@$username', style: const TextStyle(color: Colors.white60)),
                            ],
                          )
                        ],
                      ),
                      const SizedBox(height: 16),
                      Text(bio, style: const TextStyle(fontSize: 15, color: Colors.white70)),
                      const SizedBox(height: 30),
                      ElevatedButton(
                        style: ElevatedButton.styleFrom(backgroundColor: Colors.white12),
                        onPressed: () => _showEditProfileDialog(context),
                        child: const Text('Edit Account Profile Settings'),
                      )
                    ],
                  ),
                ),
              ),
            );
          }

          void _showEditProfileDialog(BuildContext context) {
            final nameController = TextEditingController(text: name);
            final userController = TextEditingController(text: username);
            final bioController = TextEditingController(text: bio);

            showDialog(
              context: context,
              builder: (context) => AlertDialog(
                title: const Text('Change Details'),
                content: Column(
                  mainAxisSize: MainAxisSize.min,
                  children: [
                    TextField(controller: nameController, decoration: const InputDecoration(labelText: 'Display Name')),
                    TextField(controller: userController, decoration: const InputDecoration(labelText: 'Username')),
                    TextField(controller: bioController, decoration: const InputDecoration(labelText: 'Bio')),
                  ],
                ),
                actions: [
                  TextButton(
                    onPressed: () {
                      setState(() {
                        name = nameController.text;
                        username = userController.text;
                        bio = bioController.text;
                      });
                      Navigator.pop(context);
                    },
                    child: const Text('Save Changes'),
                  )
                ],
              ),
            );
          }
        }
        EOF

    - name: Setup Asset Folder for Logo
      run: |
        mkdir -p assets
        sed -i '/flutter:/a \  assets:\n    - assets/logo.png' pubspec.yaml

    - name: Build APK
      run: |
        flutter pub get
        flutter build apk --release
        
    - uses: actions/upload-artifact@v4
      with:
        name: levo-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        
