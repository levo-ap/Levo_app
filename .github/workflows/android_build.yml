name: Android Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'

    # Yeh step automatic naya perfect project khada kar dega bina kisi file missing ke error ke
    - name: Create Fresh Flutter Project
      run: |
        rm -rf * .git*
        flutter create --org com.levo --project-name levo .
        
    # Yeh step automatic app ka naam "Levo" set kar dega
    - name: Set App Name to Levo
      run: |
        sed -i 's/android:label="levo"/android:label="Levo"/g' android/app/src/main/AndroidManifest.xml

    - name: Build APK
      run: |
        flutter pub get
        flutter build apk --release
        
    - uses: actions/upload-artifact@v4
      with:
        name: levo-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        
