name: Android Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'

    - name: Initialize Clean App Structure
      run: |
        flutter --disable-analytics
        rm -rf * .git*
        flutter create --org com.levo --project-name levo .

    # Perfect Fixed Production Logic (Flow: Splash -> Auth -> Home Feed)
    - name: Inject Premium Social Media Architecture
      run: |
        cat << 'EOF' > lib/main.dart
        import 'package:flutter/material.dart';
        import 'dart:async';

        void main() {
          runApp(const LevoApp());
        }

        class LevoApp extends StatelessWidget {
          const LevoApp({super.key});

          @override
          Widget build(BuildContext context) {
            return MaterialApp(
              title: 'Levo',
              debugShowCheckedModeBanner: false,
              theme: ThemeData.dark().copyWith(
                scaffoldBackgroundColor: const Color(0xFF000000), // Pure Black for OLED Screens
                colorScheme: ColorScheme.fromSeed(seedColor: const Color(0xFFD4AF37), brightness: Brightness.dark),
              ),
              home: const LuxurySplashScreen(),
            );
          }
        }

        class LuxurySplashScreen extends StatefulWidget {
          const LuxurySplashScreen({super.key});
          @override
          State<LuxurySplashScreen> createState() => _LuxurySplashScreenState();
        }

        class _LuxurySplashScreenState extends State<LuxurySplashScreen> {
          double _opacity = 1.0;

          @override
          void initState() {
            super.initState();
            Timer(const Duration(milliseconds: 1000), () {
              if (mounted) setState(() => _opacity = 0.0);
            });
            Timer(const Duration(milliseconds: 1400), () {
              if (mounted) {
                Navigator.of(context).pushReplacement(
                  MaterialPageRoute(builder: (_) => const AuthScreen()),
                );
              }
            });
          }

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              body: AnimatedOpacity(
                opacity: _opacity,
                duration: const Duration(milliseconds: 400),
                child: const Center(
                  child: Text(
                    'LEVO',
                    style: TextStyle(fontSize: 54, fontWeight: FontWeight.w900, color: Color(0xFFD4AF37), letterSpacing: 8),
                  ),
                ),
              ),
            );
          }
        }

        // --- AUTHENTICATION SCREEN (FIXED FLOW) ---
        class AuthScreen extends StatefulWidget {
          const AuthScreen({super.key});
          @override
          State<AuthScreen> createState() => _AuthScreenState();
        }

        class _AuthScreenState extends State<AuthScreen> {
          bool isLogin = true;
          @override
          Widget build(BuildContext context) {
            return Scaffold(
              body: Padding(
                padding: const EdgeInsets.symmetric(horizontal: 28.0),
                child: Column(
                  mainAxisAlignment: MainAxisAlignment.center,
                  crossAxisAlignment: CrossAxisAlignment.stretch,
                  children: [
                    const Text(
                      'Levo',
                      style: TextStyle(fontSize: 48, fontWeight: FontWeight.bold, fontFamily: 'serif', color: Colors.white),
                      textAlign: TextAlign.center,
                    ),
                    const SizedBox(height: 50),
                    TextField(
                      decoration: InputDecoration(
                        labelText: isLogin ? 'Phone number, username, or email' : 'Email address',
                        filled: true,
                        fillColor: const Color(0xFF121212),
                        border: OutlineInputBorder(borderRadius: BorderRadius.circular(8)),
                      ),
                    ),
                    const SizedBox(height: 14),
                    TextField(
                      obscureText: true,
                      decoration: InputDecoration(
                        labelText: 'Password',
                        filled: true,
                        fillColor: const Color(0xFF121212),
                        border: OutlineInputBorder(borderRadius: BorderRadius.circular(8)),
                      ),
                    ),
                    const SizedBox(height: 24),
                    ElevatedButton(
                      style: ElevatedButton.styleFrom(
                        backgroundColor: const Color(0xFFD4AF37),
                        padding: const EdgeInsets.symmetric(vertical: 14),
                        shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(8)),
                      ),
                      onPressed: () => Navigator.of(context).pushReplacement(MaterialPageRoute(builder: (_) => const HomeScreen())),
                      child: Text(isLogin ? 'Log In' : 'Sign Up', style: const TextStyle(color: Colors.black, fontSize: 16, fontWeight: FontWeight.bold)),
                    ),
                    const SizedBox(height: 20),
                    TextButton(
                      onPressed: () => setState(() => isLogin = !isLogin),
                      child: Text(
                        isLogin ? "Don't have an account? Sign up." : "Already have an account? Log in.",
                        style: const TextStyle(color: Colors.white60),
                      ),
                    )
                  ],
                ),
              ),
            );
          }
        }

        // --- INSTAGRAM LAYOUT NAVIGATION SYSTEM ---
        class HomeScreen extends StatefulWidget {
          const HomeScreen({super.key});
          @override
          State<HomeScreen> createState() => _HomeScreenState();
        }

        class _HomeScreenState extends State<HomeScreen> {
          int _currentIndex = 0;
          final List<Widget> _pages = [const VideoFeedPage(), const SearchPage(), const ProfilePage()];

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              body: _pages[_currentIndex],
              bottomNavigationBar: BottomNavigationBar(
                currentIndex: _currentIndex,
                backgroundColor: Colors.black,
                selectedItemColor: const Color(0xFFD4AF37),
                unselectedItemColor: Colors.white54,
                showSelectedLabels: false,
                showUnselectedLabels: false,
                type: BottomNavigationBarType.fixed,
                onTap: (index) => setState(() => _currentIndex = index),
                items: const [
                  BottomNavigationBarItem(icon: Icon(Icons.home_filled, size: 28), label: ''),
                  BottomNavigationBarItem(icon: Icon(Icons.search, size: 28), label: ''),
                  BottomNavigationBarItem(icon: Icon(Icons.person_outline, size: 28), label: ''),
                ],
              ),
            );
          }
        }

        // --- PREMIUM VIDEO FEED PAGE ---
        class VideoFeedPage extends StatefulWidget {
          const VideoFeedPage({super.key});
          @override
          State<VideoFeedPage> createState() => _VideoFeedPageState();
        }

        class _VideoFeedPageState extends State<VideoFeedPage> {
          double _emojiScale = 0.0;
          bool _isLiked = false;
          final List<Color> _refreshColors = [Colors.amber, Colors.redAccent, Colors.blueAccent];
          int _colorIndex = 0;

          void _triggerTelegramReaction() {
            setState(() {
              _isLiked = !_isLiked;
              _emojiScale = 1.4;
            });
            Future.delayed(const Duration(milliseconds: 500), () {
              if (mounted) setState(() => _emojiScale = 0.0);
            });
          }

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              appBar: AppBar(
                backgroundColor: Colors.black,
                title: const Text('Levo', style: TextStyle(fontFamily: 'serif', fontSize: 24, fontWeight: FontWeight.bold)),
                elevation: 0,
                actions: [
                  IconButton(icon: const Icon(Icons.favorite_border), onPressed: () {}),
                  IconButton(icon: const Icon(Icons.send_outlined), onPressed: () {}),
                ],
              ),
              body: RefreshIndicator(
                color: _refreshColors[_colorIndex],
                onRefresh: () async {
                  setState(() => _colorIndex = (_colorIndex + 1) % _refreshColors.length);
                  await Future.delayed(const Duration(seconds: 2));
                },
                child: ListView(
                  children: [
                    // Stories Row Structure
                    SizedBox(
                      height: 105,
                      child: ListView.builder(
                        scrollDirection: Axis.horizontal,
                        itemCount: 5,
                        itemBuilder: (context, index) => Padding(
                          padding: const EdgeInsets.symmetric(horizontal: 10.0, vertical: 8.0),
                          child: Column(
                            children: [
                              CircleAvatar(
                                radius: 30,
                                backgroundColor: const Color(0xFFD4AF37),
                                child: const CircleAvatar(radius: 28, backgroundColor: Colors.black, child: Icon(Icons.person, color: Colors.white)),
                              ),
                              const SizedBox(height: 4),
                              Text('User ${index + 1}', style: const TextStyle(fontSize: 11, color: Colors.white)),
                            ],
                          ),
                        ),
                      ),
                    ),
                    const Divider(color: Colors.white10, height: 1),
                    
                    // Main Feed Post Structure
                    Column(
                      crossAxisAlignment: CrossAxisAlignment.start,
                      children: [
                        ListTile(
                          leading: const CircleAvatar(backgroundColor: Colors.white10, child: Icon(Icons.person)),
                          title: const Text('levo_premium_editor', style: TextStyle(fontWeight: FontWeight.bold, fontSize: 14)),
                          subtitle: const Text('Mumbai, India', style: TextStyle(fontSize: 11, color: Colors.white60)),
                          trailing: const Icon(Icons.more_vert),
                        ),
                        GestureDetector(
                          onDoubleTap: _triggerTelegramReaction,
                          child: Stack(
                            alignment: Center,
                            children: [
                              Container(
                                height: 400,
                                color: const Color(0xFF101010),
                                child: const Center(child: Icon(Icons.movie_creation_outlined, size: 60, color: Colors.white24)),
                              ),
                              AnimatedScale(
                                scale: _emojiScale,
                                duration: const Duration(milliseconds: 250),
                                curve: Curves.bounceOut,
                                child: const Icon(Icons.local_fire_department, size: 140, color: Colors.orangeAccent),
                              ),
                            ],
                          ),
                        ),
                        Padding(
                          padding: const EdgeInsets.all(12.0),
                          child: Row(
                            mainAxisAlignment: MainAxisAlignment.spaceBetween,
                            children: [
                              Row(
                                children: [
                                  IconButton(
                                    icon: Icon(_isLiked ? Icons.favorite : Icons.favorite_border, color: _isLiked ? Colors.red : Colors.white),
                                    onPressed: _triggerTelegramReaction,
                                  ),
                                  IconButton(icon: const Icon(Icons.chat_bubble_outline), onPressed: () {}),
                                  IconButton(icon: const Icon(Icons.send_out_lined), onPressed: () {}),
                                ],
                              ),
                              const Icon(Icons.bookmark_border),
                            ],
                          ),
                        ),
                        const Padding(
                          padding: const EdgeInsets.symmetric(horizontal: 16.0),
                          child: Text('Liked by levo_network and others', style: TextStyle(fontWeight: FontWeight.bold, fontSize: 13)),
                        ),
                        Padding(
                          padding: const EdgeInsets.symmetric(horizontal: 16.0, vertical: 4.0),
                          child: RichText(
                            text: const TextSpan(
                              style: TextStyle(color: Colors.white),
                              children: [
                                TextSpan(text: 'levo_premium_editor ', style: TextStyle(fontWeight: FontWeight.bold)),
                                TextSpan(text: 'Cinematic layout base active. Clean profile UI integration. #branding #luxury', style: TextStyle(color: Colors.white70)),
                              ],
                            ),
                          ),
                        ),
                        const SizedBox(height: 20),
                      ],
                    ),
                  ],
                ),
              ),
            );
          }
        }

        class SearchPage extends StatelessWidget {
          const SearchPage({super.key});
          @override
          Widget build(BuildContext context) {
            return Scaffold(
              appBar: AppBar(backgroundColor: Colors.black, title: const TextField(decoration: InputDecoration(hintText: 'Search username, area, location...', border: InputBorder.none))),
              body: const Center(child: Text('Search Engine Active', style: TextStyle(color: Colors.white60))),
            );
          }
        }

        class ProfilePage extends StatefulWidget {
          const ProfilePage({super.key});
          @override
          State<ProfilePage> createState() => _ProfilePageState();
        }

        class _ProfilePageState extends State<ProfilePage> {
          @override
          Widget build(BuildContext context) {
            return const Scaffold(
              body: Center(child: Text('User Profile Panel Active', style: TextStyle(color: Colors.white60))),
            );
          }
        }
        EOF

    - name: Build APK
      run: |
        flutter pub get
        flutter build apk --release
        
    - uses: actions/upload-artifact@v4
      with:
        name: levo-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        
