name: Android Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'

    - name: Create Fresh Flutter Project
      run: |
        rm -rf * .git*
        flutter create --org com.levo --project-name levo .

    # Yeh step poori app mein animated premium luxury dark theme aur splash setup karega
    - name: Overwrite Code with Premium Levo Experience
      run: |
        cat << 'EOF' > lib/main.dart
        import 'package:flutter/material.dart';

        void main() {
          runApp(const MyApp());
        }

        class MyApp extends StatelessWidget {
          const MyApp({super.key});

          @override
          Widget build(BuildContext context) {
            return MaterialApp(
              title: 'Levo',
              debugShowCheckedModeBanner: false,
              theme: ThemeData.dark().copyWith(
                scaffoldBackgroundColor: const Color(0xFF0A0A0A),
                colorScheme: ColorScheme.fromSeed(
                  seedColor: const Color(0xFFD4AF37),
                  brightness: Brightness.dark,
                ),
              ),
              home: const SplashScreen(),
            );
          }
        }

        class SplashScreen extends StatefulWidget {
          const SplashScreen({super.key});

          @override
          State<SplashScreen> createState() => _SplashScreenState();
        }

        class _SplashScreenState extends State<SplashScreen> with SingleTickerProviderStateMixin {
          late AnimationController _controller;
          late Animation<double> _fadeAnimation;
          late Animation<double> _scaleAnimation;
          bool _isLoading = true;

          @override
          void initState() {
            super.initState();
            _controller = AnimationController(
              vsync: this,
              duration: const Duration(milliseconds: 1500),
            );

            _fadeAnimation = Tween<double>(begin: 0.0, end: 1.0).animate(
              CurvedAnimation(parent: _controller, curve: Curves.easeIn),
            );

            _scaleAnimation = Tween<double>(begin: 0.8, end: 1.0).animate(
              CurvedAnimation(parent: _controller, curve: Curves.easeOutBack),
            );

            _controller.forward();

            Future.delayed(const Duration(seconds: 3), () {
              if (mounted) {
                setState(() {
                  _isLoading = false;
                });
              }
            });
          }

          @override
          void dispose() {
            _controller.dispose();
            super.dispose();
          }

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              body: Center(
                child: _isLoading
                    ? Column(
                        mainAxisAlignment: MainAxisAlignment.center,
                        children: [
                          ScaleTransition(
                            scale: _scaleAnimation,
                            child: FadeTransition(
                              opacity: _fadeAnimation,
                              child: const Text(
                                'Levo',
                                style: TextStyle(
                                  fontSize: 48,
                                  fontWeight: FontWeight.w900,
                                  letterSpacing: 4.0,
                                  color: Color(0xFFD4AF37),
                                ),
                              ),
                            ),
                          ),
                          const SizedBox(height: 40),
                          const SizedBox(
                            width: 30,
                            height: 30,
                            child: CircularProgressIndicator(
                              color: Color(0xFFD4AF37),
                              strokeWidth: 2,
                            ),
                          ),
                        ],
                      )
                    : FadeTransition(
                        opacity: _fadeAnimation,
                        child: const Text(
                          'Welcome to Levo',
                          style: TextStyle(fontSize: 24, fontWeight: FontWeight.w300, letterSpacing: 2.0),
                        ),
                      ),
              ),
            );
          }
        }
        EOF

    - name: Force App Name to Levo
      run: |
        sed -i 's/android:label="levo"/android:label="Levo"/g' android/app/src/main/AndroidManifest.xml

    - name: Build APK
      run: |
        flutter pub get
        flutter build apk --release
        
    - uses: actions/upload-artifact@v4
      with:
        name: levo-release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
        
