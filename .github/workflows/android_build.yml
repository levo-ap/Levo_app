import 'package:flutter/material.dart';
import 'package:shared_preferences/shared_preferences.dart';

void main() async {
  WidgetsFlutterBinding.ensureInitialized();
  final prefs = await SharedPreferences.getInstance();
  final bool isLoggedIn = prefs.getBool('isLoggedIn') ?? false;
  runApp(MaterialApp(
    debugShowCheckedModeBanner: false,
    theme: ThemeData.dark().copyWith(scaffoldBackgroundColor: Colors.black),
    home: isLoggedIn ? const HomeScreen() : const LoginScreen(),
  ));
}

class LoginScreen extends StatefulWidget {
  const LoginScreen({super.key});
  @override
  State<LoginScreen> createState() => _LoginScreenState();
}

class _LoginScreenState extends State<LoginScreen> {
  bool _hide = true;
  final TextEditingController _user = TextEditingController();

  void _login() async {
    final prefs = await SharedPreferences.getInstance();
    await prefs.setBool('isLoggedIn', true);
    // Yahan IP/Device log save karne ka logic add hoga
    Navigator.pushReplacement(context, MaterialPageRoute(builder: (_) => const HomeScreen()));
  }

  @override
  Widget build(BuildContext context) {
    return Scaffold(
      body: Center(
        child: Column(
          mainAxisAlignment: MainAxisAlignment.center,
          children: [
            const Text('LEVO', style: TextStyle(fontSize: 40, fontWeight: FontWeight.bold, color: Color(0xFF00E5FF))),
            Padding(padding: const EdgeInsets.all(20), child: TextField(controller: _user, decoration: const InputDecoration(labelText: 'Username'))),
            Padding(padding: const EdgeInsets.all(20), child: TextField(obscureText: _hide, decoration: InputDecoration(labelText: 'Password', suffixIcon: IconButton(icon: Icon(_hide ? Icons.visibility_off : Icons.visibility), onPressed: () => setState(() => _hide = !_hide))))),
            ElevatedButton(onPressed: _login, child: const Text('Login')),
          ],
        ),
      ),
    );
  }
}

class HomeScreen extends StatelessWidget {
  const HomeScreen({super.key});
  @override
  Widget build(BuildContext context) {
    return Scaffold(
      appBar: AppBar(
        title: const Text('LEVO'),
        actions: [IconButton(icon: const Icon(Icons.add_box_outlined), onPressed: () {}), IconButton(icon: const Icon(Icons.near_me), onPressed: () {})],
      ),
      body: ListView(
        children: [
          const ListTile(leading: Icon(Icons.search), title: Text('Search...')),
          SizedBox(height: 500, child: PageView.builder(scrollDirection: Axis.vertical, itemCount: 10, itemBuilder: (_, i) => Container(margin: const EdgeInsets.all(10), color: Colors.grey[900], child: Center(child: Text('Reel $i 📱'))))),
        ],
      ),
      bottomNavigationBar: BottomNavigationBar(
        type: BottomNavigationBarType.fixed,
        items: const [
          BottomNavigationBarItem(icon: Icon(Icons.home), label: ''),
          BottomNavigationBarItem(icon: Icon(Icons.camera_alt), label: ''),
          BottomNavigationBarItem(icon: Icon(Icons.live_tv), label: ''),
          BottomNavigationBarItem(icon: Icon(Icons.person), label: '')
        ],
      ),
    );
  }
}
